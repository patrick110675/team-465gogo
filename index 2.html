<!doctype html><html lang="zh-Hant-TW"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111f"><title>AMR 人力特攻隊</title><style>
:root{--bg:#07111f;--card:#0f1f36;--line:rgba(255,255,255,.12);--text:#eaf2ff;--muted:#91a4bd;--gold:#f6c453;--orange:#fb923c;--green:#22c55e;--red:#ef4444;--blue:#38bdf8;--shadow:0 20px 50px rgba(0,0,0,.32)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;background:radial-gradient(circle at top,#12395e 0,#07111f 42%,#020617 100%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans TC',Arial,sans-serif}button,input,select{font:inherit}button{border:0;cursor:pointer}#app{max-width:980px;margin:0 auto;padding:18px 14px 96px}.top{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:14px}.brand h1{font-size:25px;margin:0;font-weight:950}.brand p{margin:5px 0 0;color:var(--muted);font-weight:800}.btn{border-radius:16px;padding:12px 15px;font-weight:950;color:#fff;background:rgba(255,255,255,.07);border:1px solid var(--line)}.primary{background:linear-gradient(135deg,#f97316,#ea580c)}.blue{background:linear-gradient(135deg,#075985,#0c4a6e)}.green{background:linear-gradient(135deg,#14532d,#166534)}.red{background:linear-gradient(135deg,#991b1b,#7f1d1d)}.gold{background:linear-gradient(135deg,#b45309,#92400e)}.hero{border:1px solid rgba(246,196,83,.25);border-radius:28px;padding:22px;background:radial-gradient(circle at left top,rgba(246,196,83,.25),transparent 30%),linear-gradient(135deg,#251338,#0f172a 65%,#111827);box-shadow:var(--shadow);margin-bottom:14px}.tag{display:inline-block;border-radius:999px;padding:8px 13px;background:linear-gradient(135deg,#e11d48,#b45309);font-weight:950}.champ{font-size:38px;font-weight:950;color:#fde68a;margin-top:22px}.score{font-size:64px;line-height:1;color:#fff7cc;font-weight:950}.score small{font-size:24px;color:#fde68a}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.card{background:rgba(9,20,36,.85);border:1px solid var(--line);border-radius:24px;padding:16px;box-shadow:var(--shadow);margin:12px 0}.card h2{margi display:flex;align-items:center;gap:8px}.ctrl button{width:38px;height:38px;border-radius:14px;background:rgba(255,255,255,.08);border:1px solid var(--line);color:#fff;font-size:22px;font-weight:950}.num{min-width:26px;text-align:center;font-weight:950}.total{display:flex;justify-content:space-between;align-items:center;margin:14px 0;padding:15px;border-radius:18px;background:rgba(246,196,83,.1);border:1px solid rgba(246,196,83,.22);font-weight:950}.total b{font-size:28px;color:#fde68a}.att{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.att div{text-align:center;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.05);padding:12px;font-weight:950}.qr{display:flex;align-items:center;flex-direction:column;gap:12px}.qr img{width:280px;max-width:90%;background:#fff;border-radius:24px;padding:14px}.small{font-size:12px;color:var(--muted);font-weight:800}.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#111827;border:1px solid var(--line);border-radius:999px;padding:12px 18px;font-weight:950;box-shadow:var(--shadow);z-index:99}@media(max-width:720px){.grid{grid-template-columns:1fr}.champ{font-size:32px}.score{font-size:58px}.att{grid-template-columns:1fr 1fr}}
</style></head><body><div id="app">載入中...</div><nav class="nav" id="nav"></nav><script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';import{getAuth,signInAnonymously}from'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';import{getFirestore,collection,onSnapshot,doc,setDoc,deleteDoc}from'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
const firebaseConfig={apiKey:'AIzaSyCCBe5b_3jMHYSnwQwQr4r7uNdzm61PWBY',authDomain:'team-465.firebaseapp.com',projectId:'team-465',storageBucket:'team-465.firebasestorage.app',messagingSenderId:'1083534515383',appId:'1:1083534515383:web:b4f466e0ac36d42bc34132'};const fb=initializeApp(firebaseConfig),auth=getAuth(fb),db=getFirestore(fb);
const DEFAULT={teams:[{id:'wolves',name:'五狼攏來隊',members:['天景','小怡君','立維','永朋']},{id:'han',name:'瀚瀚瀚瀚得第一',members:['子瀚','靜萱','陳怡君','雅韻']},{id:'win',name:'盈在起跑點',members:['可盈','恩慈','士誼','奎璿','美如']},{id:'sun',name:'陽光委任隊',members:['怡蒨','楚涵','永濂','瑀芯']},{id:'come',name:'你來就隊',members:['巧云','乙榛','圜翰','建宏']}],teamRules:[{key:'activity_creation_self',label:'夢想起飛 / 夜創出席',unit:'次',points:2},{key:'activity_creation_friends',label:'帶新朋友參加夢想起飛 / 夜創',unit:'人',points:3},{key:'activity_soft_self',label:'通訊處軟性活動出席',unit:'次',points:2},{key:'activity_soft_friends',label:'帶新朋友參加軟性活動',unit:'人',points:3},{key:'exam_passed',label:'公司考通過',unit:'人',points:3},{key:'register_contract',label:'登錄 + 簽約',unit:'人',points:10},{key:'attend_training',label:'參加優培',unit:'人',points:10},{key:'team_recruit_activity',label:'團隊共同運作增員',unit:'次',points:1}],personalRules:[{key:'net_contact',label:'網增接觸 / 新增名單 / 約訪',unit:'次',points:1},{key:'warm_cop',label:'緣故約訪 / COP / 軟性活動',unit:'次',points:1},{key:'first_interview',label:'初次面談',unit:'次',points:5},{key:'deep_interview',label:'深度面談',unit:'次',points:8},{key:'self_cop',label:'自己參加 COP',unit:'次',points:8},{key:'friend_cop',label:'帶新朋友參加 COP',unit:'位',points:8}],events:[],settings:{title:'AMR 人力特攻隊',subtitle:'團結｜合作｜突破｜共創榮耀'}};
const s={page:new URLSearchParams(location.search).get('page')==='checkin'?'checkin':'home',cfg:null,records:[],team:'',name:'',type:'team',vals:{},admin:'teams'};const app=document.getElementById('app');const C=()=>s.cfg||DEFAULT,teams=()=>C().teams||[],teamRules=()=>C().teamRules||[],personalRules=()=>C().personalRules||[],events=()=>C().events||[];const people=()=>teams().flatMap(t=>t.members.map(name=>({name,team:t.name})));const week=()=>{let d=new Date(),day=d.getDay(),m=new Date(d);m.setDate(d.getDate()-day+(day===0?-6:1));let e=new Date(m);e.setDate(m.getDate()+6);return`${m.getMonth()+1}/${m.getDate()} - ${e.getMonth()+1}/${e.getDate()}`};const uid=p=>p+'-'+Math.random().toString(36).slice(2,9);const toast=m=>{let x=document.createElement('div');x.className='toast';x.textContent=m;document.body.appendChild(x);setTimeout(()=>x.remove(),2200)};const teamBy=n=>teams().find(t=>t.name===n);const members=()=>s.team?(teamBy(s.team)?.members||[]):[];
function rulePoint(k){return Number((teamRules().find(r=>r.key===k)||{}).points||0)}function tpl(type){return{amr:{label:'AMR例會',attendanceOnly:true},night:{label:'夜創',attendKey:'activity_creation_self',friendKey:'activity_creation_friends'},dream:{label:'夢想起飛',attendKey:'activity_creation_self',friendKey:'activity_creation_friends'},soft:{label:'軟性活動',attendKey:'activity_soft_self',friendKey:'activity_soft_friends'}}[type||'amr']}function activeEvent(){return events().find(e=>e.active)||events()[0]}function attendPoint(e){return e?.attendanceOnly?0:rulePoint(e.attendKey)}function friendPoint(e){return e?.attendanceOnly?0:rulePoint(e.friendKey)}function totalEvent(e,f=0){return attendPoint(e)+Number(f)*friendPoint(e)}function calc(type,vals){return(type==='team'?teamRules():personalRules()).reduce((a,r)=>a+Number(vals[r.key]||0)*Number(r.points||0),0)}function teamRank(){let o={};teams().forEach(t=>o[t.name]=0);s.records.forEach(r=>{if(r.team&&o[r.team]!==undefined)o[r.team]+=Number(r.totalScore||0)});return Object.entries(o).map(([team,score])=>({team,score})).sort((a,b)=>b.score-a.score)}function personRank(){let o={};people().forEach(p=>o[p.name]={score:0,team:p.team});s.records.forEach(r=>{if(r.name){if(!o[r.name])o[r.name]={score:0,team:r.team};o[r.name].score+=Number(r.totalScore||0)}});return Object.entries(o).map(([name,d])=>({name,...d})).sort((a,b)=>b.score-a.score)}function attRows(ev){return people().map(p=>{let id=`checkin_${ev?.id}_${p.name}`,r=s.records.find(x=>x.id===id);return{...p,r,status:r?.attendanceStatus||(r?'present':'absent')}})}function attSummary(ev){let rows=ev?attRows(ev):[];let c=x=>rows.filter(r=>r.status===x).length;return{present:c('present'),late:c('late'),leave:c('leave'),absent:c('absent')}}function late(ev,ts){if(!ev?.startTime)return false;let st=new Date(`${ev.date||new Date().toISOString().slice(0,10)}T${ev.startTime}:00`).getTime();return ts>st+Number(ev.graceMinutes||5)*60000}function statusText(x){return x==='present'?'🟢 已到':x==='late'?'🟠 遲到':x==='leave'?'🟡 請假':'🔴 未到'}
function shell(body){app.innerHTML=`<div class="top"><div class="brand"><h1>${C().settings?.title||'AMR 人力特攻隊'}</h1><p>${C().settings?.subtitle||'團結｜合作｜突破｜共創榮耀'}</p></div><button class="btn" onclick="go('admin')">⚙️</button></div>${body}`;nav()}function nav(){document.getElementById('nav').innerHTML=[['home','🏠','首頁'],['score','➕','積分'],['activity','📅','活動'],['rank','🏆','排行'],['admin','⚙️','管理']].map(x=>`<button class="${s.page===x[0]?'on':''}" onclick="go('${x[0]}')"><span>${x[1]}</span>${x[2]}</button>`).join('')}window.go=p=>{s.page=p;render()}
function rows(arr,type){return arr.map((r,i)=>`<div class="row"><div class="rank ${i===0?'top':''}">${i+1}</div><div><div class="name">${type==='team'?r.team:r.name}</div><div class="sub">${type==='team'?'團隊':r.team}</div></div><div class="rscore">${r.score}</div></div>`).join('')||'<div class="small">尚無資料</div>'}function home(){let tr=teamRank(),pr=personRank(),ev=activeEvent(),a=attSummary(ev);shell(`<section class="hero"><span class="tag">👑 本期冠軍</span><div class="champ">${tr[0]?.team||'尚無資料'}</div><div class="score">${tr[0]?.score||0}<small> 分</small></div></section><div class="grid"><section class="card mini"><div class="mini-label">MVP</div><div class="mini-name">${pr[0]?.name||'尚無'}</div><div class="mini-score">${pr[0]?.score||0} 分</div></section><section class="card mini"><div class="mini-label">AMR 出席</div><div class="att"><div>🟢 ${a.present}</div><div>🟡 ${a.leave}</div><div>🟠 ${a.late}</div><div>🔴 ${a.absent}</div></div></section></div><section class="card"><h2>團隊前三名</h2>${rows(tr.slice(0,3),'team')}</section><section class="card"><h2>個人排行榜</h2>${rows(pr.slice(0,6),'person')}</section><section class="card"><h2>最新紀錄</h2>${s.records.slice(0,5).map(r=>`<div class="row"><div>＋</div><div><div class="name">${r.name||''}</div><div class="sub">${r.note||'積分紀錄'}｜${r.team||''}</div></div><div class="rscore">${r.totalScore||0}</div></div>`).join('')||'尚無紀錄'}</section>`)}
function score(){let rules=s.type==='team'?teamRules():personalRules();shell(`<section class="card"><h2>新增積分</h2><div class="tabs"><button class="tab ${s.type==='team'?'on':''}" onclick="setType('team')">團隊</button><button class="tab ${s.type==='personal'?'on':''}" onclick="setType('personal')">個人</button></div><label class="field"><span>隊伍</span><select onchange="s.team=this.value;s.name='';render()"><option value="">請選擇</option>${teams().map(t=>`<option ${s.team===t.name?'selected':''}>${t.name}</option>`).join('')}</select></label><label class="field"><span>姓名</span><select ${s.team?'':'disabled'} onchange="s.name=this.value"><option value="">請選擇</option>${members().map(m=>`<option ${s.name===m?'selected':''}>${m}</option>`).join('')}</select></label>${rules.map(r=>`<div class="item"><div><div class="name">${r.label}</div><div class="small">+${r.points} 分 / ${r.unit}</div></div><div class="ctrl"><button onclick="dec('${r.key}')">−</button><div class="num">${s.vals[r.key]||0}</div><button onclick="inc('${r.key}')">＋</button></div></div>`).join('')}<div class="total"><span>本次得分</span><b>${calc(s.type,s.vals)}</b></div><button class="btn primary" style="width:100%" onclick="saveScore()">送出</button></section>`)}window.setType=t=>{s.type=t;s.vals={};render()};window.inc=k=>{s.vals[k]=Number(s.vals[k]||0)+1;render()};window.dec=k=>{s.vals[k]=Math.max(0,Number(s.vals[k]||0)-1);render()};window.saveScore=async()=>{if(!s.team||!s.name)return toast('請選隊伍與姓名');let total=calc(s.type,s.vals);if(total<=0)return toast('請新增分數');await setDoc(doc(db,'team_scores',`score_${Date.now()}`),{...s.vals,week:week(),team:s.team,name:s.name,recordType:s.type,totalScore:total,note:'手動加分',createdAt:Date.now()});s.vals={};toast('新增成功');go('home')}
function activity(){let ev=activeEvent();let qr=ev?`https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent(location.origin+location.pathname+'?page=checkin&event='+ev.id)}`:'';shell(`<section class="card"><h2>建立活動</h2><div class="grid"><button class="btn blue" onclick="createEvent('amr')">AMR例會</button><button class="btn gold" onclick="createEvent('night')">夜創</button><button class="btn green" onclick="createEvent('dream')">夢想起飛</button><button class="btn primary" onclick="createEvent('soft')">軟性活動</button></div></section>${ev?`<section class="card"><h2>${ev.name}</h2><p class="small">${ev.attendanceOnly?'只出席，不加分':`出席 +${attendPoint(ev)}｜新朋友 +${friendPoint(ev)}/人`}</p><div class="qr"><img src="${qr}"><button class="btn primary" onclick="copyQR()">複製連結</button></div></section><section class="card"><h2>簽到名單</h2>${attRows(ev).map(r=>`<div class="row"><div></div><div><div class="name">${r.name}</div><div class="sub">${r.team}</div></div><div class="rscore" style="font-size:14px">${statusText(r.status)}</div></div>`).join('')}</section>`:''}`)}window.createEvent=async(type)=>{let d=new Date(),t=tpl(type),name=prompt('活動名稱',`${d.getMonth()+1}/${d.getDate()} ${t.label}`);if(!name)return;let cfg=structuredClone(C());cfg.events=(cfg.events||[]).map(e=>({...e,active:false}));cfg.events.push({id:uid('event'),template:type,name,date:d.toISOString().slice(0,10),startTime:'09:00',graceMinutes:5,attendanceOnly:!!t.attendanceOnly,attendKey:t.attendKey,friendKey:t.friendKey,active:true});await setDoc(doc(db,'platform','settings'),cfg);toast('已建立活動')};window.copyQR=async()=>{let ev=activeEvent();await navigator.clipboard.writeText(location.origin+location.pathname+'?page=checkin&event='+ev.id);toast('已複製')}
function checkin(){let ev=events().find(e=>e.id===new URLSearchParams(location.search).get('event'))||activeEvent();let ms=members();shell(`<section class="card"><h2>${ev?.name||'活動簽到'}</h2><p class="small">${ev?.attendanceOnly?'AMR只簽到不加分':`出席 +${attendPoint(ev)}｜新朋友 +${friendPoint(ev)}/人`}</p><label class="field"><span>隊伍</span><select onchange="s.team=this.value;s.name='';render()"><option value="">請選擇</option>${teams().map(t=>`<option ${s.team===t.name?'selected':''}>${t.name}</option>`).join('')}</select></label><label class="field"><span>姓名</span><select ${s.team?'':'disabled'} onchange="s.name=this.value"><option value="">請選擇</option>${ms.map(m=>`<option ${s.name===m?'selected':''}>${m}</option>`).join('')}</select></label>${ev&&!ev.attendanceOnly?`<div class="item"><div><div class="name">今天帶幾位新朋友？</div><div class="small">依積分設定自動計算</div></div><div class="ctrl"><button onclick="friend(-1)">−</button><div class="num">${s.vals.friends||0}</div><button onclick="friend(1)">＋</button></div></div><div class="total"><span>本次加分</span><b>${totalEvent(ev,s.vals.friends||0)}</b></div>`:''}<button class="btn primary" style="width:100%" onclick="doCheckin('${ev?.id||''}')">完成</button></section>`)}window.friend=n=>{s.vals.friends=Math.max(0,Number(s.vals.friends||0)+n);render()};window.doCheckin=async(id)=>{let ev=events().find(e=>e.id===id);if(!ev||!s.team||!s.name)return toast('請選隊伍與姓名');let rid=`checkin_${ev.id}_${s.name}`;if(s.records.some(r=>r.id===rid))return toast('已完成本場簽到');let now=Date.now(),friends=Number(s.vals.friends||0),isLate=ev.attendanceOnly&&late(ev,now),total=ev.attendanceOnly?0:totalEvent(ev,friends);await setDoc(doc(db,'team_scores',rid),{eventId:ev.id,eventName:ev.name,team:s.team,name:s.name,week:week(),recordType:ev.attendanceOnly?'attendance':'personal',attendanceStatus:ev.attendanceOnly?(isLate?'late':'present'):'present',friends,totalScore:total,note:ev.attendanceOnly?`${ev.name}簽到`:`${ev.name} 出席${friends?`｜新朋友${friends}位`:''}`,createdAt:now});s.vals={};toast(ev.attendanceOnly?'簽到成功':`完成 +${total}`);go('home')}
function rank(){shell(`<section class="card"><h2>團隊排行</h2>${rows(teamRank(),'team')}</section><section class="card"><h2>個人排行</h2>${rows(personRank(),'person')}</section>`)}function admin(){shell(`<section class="card"><h2>管理中心</h2><div class="grid"><button class="btn blue" onclick="adminTab('teams')">隊伍/成員</button><button class="btn gold" onclick="adminTab('points')">積分設定</button></div><div id="adminBox" style="margin-top:12px"></div></section>`);adminTab(s.admin)}window.adminTab=t=>{s.admin=t;let box=document.getElementById('adminBox');if(!box)return;if(t==='teams'){box.innerHTML=`<input id="newTeam" placeholder="新增隊伍"><button class="btn primary" onclick="addTeam()" style="margin-top:8px">新增隊伍</button>${teams().map((team,i)=>`<div class="card"><h2>${team.name}</h2><div>${team.members.map(m=>`<span class="btn" style="display:inline-block;margin:4px">${m}</span>`).join('')}</div><input id="mem${i}" placeholder="新增成員"><button class="btn blue" onclick="addMem(${i})" style="margin-top:8px">新增成員</button></div>`).join('')}`}else{box.innerHTML=`<h3>團隊積分</h3>${teamRules().map((r,i)=>`<label class="field"><span>${r.label}</span><input type="number" value="${r.points}" onchange="savePoint('team',${i},this.value)"></label>`).join('')}<h3>個人積分</h3>${personalRules().map((r,i)=>`<label class="field"><span>${r.label}</span><input type="number" value="${r.points}" onchange="savePoint('personal',${i},this.value)"></label>`).join('')}`}};window.addTeam=async()=>{let v=document.getElementById('newTeam').value.trim();if(!v)return;let cfg=structuredClone(C());cfg.teams.push({id:uid('team'),name:v,members:[]});await setDoc(doc(db,'platform','settings'),cfg)};window.addMem=async i=>{let v=document.getElementById('mem'+i).value.trim();if(!v)return;let cfg=structuredClone(C());cfg.teams[i].members.push(v);await setDoc(doc(db,'platform','settings'),cfg)};window.savePoint=async(t,i,v)=>{let cfg=structuredClone(C());(t==='team'?cfg.teamRules:cfg.personalRules)[i].points=Number(v||0);await setDoc(doc(db,'platform','settings'),cfg);toast('已儲存')};function render(){if(s.page==='home')home();else if(s.page==='score')score();else if(s.page==='activity')activity();else if(s.page==='rank')rank();else if(s.page==='admin')admin();else if(s.page==='checkin')checkin()}await signInAnonymously(auth);onSnapshot(doc(db,'platform','settings'),async snap=>{if(!snap.exists()){await setDoc(doc(db,'platform','settings'),DEFAULT);s.cfg=DEFAULT}else s.cfg=snap.data();render()});onSnapshot(collection(db,'team_scores'),snap=>{s.records=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));render()});
</script></body></html>
