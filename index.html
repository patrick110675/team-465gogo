    await setDoc(ref,{...firestorePatch,updatedAt:serverTimestamp()},{merge:true});
    const verify=await getDoc(ref);if(!verify.exists())throw new Error('Firebase 找不到設定文件');const server=verify.data();
    for(const [k,v] of Object.entries(firestorePatch)){if(!sameValue(server[k],v))throw new Error(`欄位 ${k} 儲存後驗證不一致`)}
    S.settings={...defaultSettings,...server};applyTheme();render();toast(successText);return server;
  }finally{settingsWriteDepth=Math.max(0,settingsWriteDepth-1)}
}

const norm=v=>String(v||'').trim().toLowerCase();
function readLegacyTeams(data){
  const a=data?.amrData?.teams;
  const b=data?.teams;
  if(Array.isArray(a)&&a.length) return a;
  if(Array.isArray(b)&&b.length) return b;
  return [];
}
async function importLegacyTeams(manual=false){
  try{
    const snap=await getDoc(doc(db,'platform','settings'));
    const data=snap.exists()?snap.data():{};
    const legacy=readLegacyTeams(data);
    if(!legacy.length){S.importReport='找不到舊隊伍資料'; if(manual) toast('找不到舊資料'); render(); return;}
    const teamDocs=(await getDocs(col('teams'))).docs.map(d=>({id:d.id,...d.data()}));
    const memDocs=(await getDocs(col('members'))).docs.map(d=>({id:d.id,...d.data()}));
    const teamMap=new Map(teamDocs.map(t=>[norm(t.name),t]));
    const memberSet=new Set(memDocs.map(m=>norm((m.teamName||'')+'|'+(m.name||''))));
    let addedTeams=0, addedMembers=0, skippedTeams=0, skippedMembers=0;
    for(const raw of legacy){
      const name=String(raw?.name||raw?.title||'').trim();
      if(!name) continue;
      let team=teamMap.get(norm(name));
      if(!team){
        const ref=await addDoc(col('teams'),{name, color:raw.color||'', icon:raw.icon||'', note:'由舊資料自動匯入', source:'legacy', createdAt:serverTimestamp(), updatedAt:serverTimestamp()});
        team={id:ref.id,name}; teamMap.set(norm(name),team); addedTeams++;
      }else skippedTeams++;
      const members=Array.isArray(raw.members)?raw.members:[];
      for(const m of members){
        const mn=String(m?.name||m||'').trim();
        if(!mn) continue;
        const key=norm(name+'|'+mn);
        if(memberSet.has(key)){skippedMembers++; continue;}
        await addDoc(col('members'),{name:mn, teamId:team.id, teamName:name, role:'', phone:'', status:'active', source:'legacy', createdAt:serverTimestamp(), updatedAt:serverTimestamp()});
        memberSet.add(key); addedMembers++;
      }
    }
    await setDoc(doc(db,'platform','settings'),{legacyImportedAt:new Date().toISOString(),updatedAt:serverTimestamp()},{merge:true});
    S.importReport=`已匯入 ${addedTeams} 個隊伍、${addedMembers} 位人員；略過重複 ${skippedTeams} 個隊伍、${skippedMembers} 位人員。`;
    toast('匯入完成'); render();
  }catch(e){console.error(e); S.importReport='匯入失敗：'+(e?.message||e); if(manual) toast('匯入失敗'); render();}
}

function readImageSlots(x){const arr=Array.from({length:6},(_,i)=>String(x?.[`contentImage${i+1}`]||'').trim());if(arr.some(Boolean))return arr;const old=Array.isArray(x?.contentImages)?x.contentImages.flat(Infinity).filter(v=>typeof v==='string').slice(0,6):[];while(old.length<6)old.push('');return old;}

  const entries=portalEntriesFor(p.id);

    if(!target)return toast('找不到可復原項目');

    const restored=Array.isArray(target.item)?[...target.item]:[target.item?.key,target.item?.label,Number(target.item?.points||0)];

    render();
    toast('正在復原積分項目…');

  }
}

async function waitForFirebaseUser(timeoutMs=10000){if(currentUser)return currentUser;return await new Promise((resolve,reject)=>{let done=false;const timer=setTimeout(()=>{if(!done){done=true;reject(new Error('Firebase 登入逾時，請重新整理後再試'))}},timeoutMs);const off=onAuthStateChanged(auth,u=>{if(u&&!done){done=true;clearTimeout(timer);off();currentUser=u;resolve(u)}});signInAnonymously(auth).catch(e=>{if(!done){done=true;clearTimeout(timer);off();reject(e)}})})}
function dataUrlToBlob(dataUrl){const [head,body]=dataUrl.split(',');const mime=(head.match(/data:(.*?);/)||[])[1]||'image/jpeg';const bin=atob(body);const arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime})}
async function uploadImageFileDirect(file,folder,max=1600,targetBytes=700000){await waitForFirebaseUser();const data=await compressImageFile(file,max,targetBytes);const blob=dataUrlToBlob(data);const token=(crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2));const path=`${folder}/${Date.now()}-${token}.jpg`;const snap=await uploadBytes(storageRef(storage,path),blob,{contentType:'image/jpeg'});return await getDownloadURL(snap.ref)}

async function compressImageFile(f,max=1600,targetBytes=850000){
  if(!f?.type?.startsWith('image/')) throw new Error('不是圖片');
  const img=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>{const im=new Image();im.onload=()=>res(im);im.onerror=rej;im.src=r.result};r.onerror=rej;r.readAsDataURL(f)});
  let w=img.width,h=img.height;if(Math.max(w,h)>max){const ratio=max/Math.max(w,h);w=Math.round(w*ratio);h=Math.round(h*ratio)}
  const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;const ctx=canvas.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);
  let q=.82,data=canvas.toDataURL('image/jpeg',q);while(data.length>targetBytes&&q>.35){q-=.07;data=canvas.toDataURL('image/jpeg',q)}
  if(data.length>1000000)throw new Error('圖片太大');return data;
}
async function ensureStorageImage(value,folder='portal-images'){
  if(!value)return '';
  if(!String(value).startsWith('data:image/'))return value;
  const blob=await fetch(value).then(r=>r.blob());
  const ext=(blob.type.split('/')[1]||'jpg').replace('jpeg','jpg');
  const token=(crypto.randomUUID?crypto.randomUUID():Math.random().toString(36).slice(2));
  const path=`${folder}/${Date.now()}-${token}.${ext}`;
  const snap=await uploadBytes(storageRef(storage,path),blob,{contentType:blob.type||'image/jpeg'});
  return await getDownloadURL(snap.ref);
}
async function uploadCompressedImageFile(file,folder='portal-images',max=1600,targetBytes=850000){
  const data=await compressImageFile(file,max,targetBytes);
  return await ensureStorageImage(data,folder);
}
async function fileToData(input,target){
  const f=input.files?.[0];if(!f)return;toast('封面圖片上傳中…');
  try{
    const url=await uploadCompressedImageFile(f,'portal-images/covers',1600,700000);
    $(target).value=url;
    if(S.edit?.type==='portal'){S.edit.data.image=url;S.edit.data.coverImage=url;}
    toast('封面圖片已上傳，請按儲存 Portal');
  }catch(e){console.error(e);toast(`圖片上傳失敗：${e?.message||e}`)}
}
async function handleBulkPortalFiles(input){
  const files=[...(input.files||[])];if(files.length!==6)return toast('請一次選擇剛好 6 張圖片');toast('正在上傳六張封面…');
  try{
    S.bulkPortalImages=[];
    for(let i=0;i<files.length;i++){
      toast(`正在上傳第 ${i+1}/6 張…`);
      S.bulkPortalImages.push(await uploadCompressedImageFile(files[i],'portal-images/covers',1200,420000));
    }
    render();toast('六張圖片已上傳，可確認順序後套用');
  }catch(e){console.error(e);S.bulkPortalImages=[];toast(`六張圖片上傳失敗：${e?.message||e}`)}
}

async function handlePortalPdfFile(input){
  const file=input.files?.[0];
  if(!file)return;
  if(file.type!=='application/pdf'&&!file.name.toLowerCase().endsWith('.pdf')){toast('請選擇 PDF 檔案');input.value='';return;}
  if(file.size>25*1024*1024){toast('PDF 請小於 25MB');input.value='';return;}
  try{
    toast('PDF 上傳中…');
    const safeName=file.name.replace(/[^a-zA-Z0-9._\-\u4e00-\u9fff]/g,'_');
    const path=`portal-pdfs/${Date.now()}-${safeName}`;
    const snap=await uploadBytes(storageRef(storage,path),file,{contentType:'application/pdf'});
    const url=await getDownloadURL(snap.ref);
    const urlInput=$('#portalPdf');const nameInput=$('#portalPdfName');
    if(urlInput)urlInput.value=url;if(nameInput)nameInput.value=file.name;
    if(S.edit?.type==='portal'){S.edit.data.pdfUrl=url;S.edit.data.pdfName=file.name;}
    toast('PDF 已上傳，請按儲存 Portal');
    render();
  }catch(e){console.error(e);toast('PDF 上傳失敗，請確認 Firebase Storage 規則');}
}
